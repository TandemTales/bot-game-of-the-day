<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroid Dodger — Bot Built Arcade</title>
<style>
body{background:#0d0e1a;color:#e8e9f3;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px}
a.back{color:#9aa0b8;text-decoration:none;align-self:flex-start}a.back:hover{color:#7c5cff}
h1{margin:10px 0}
canvas{background:#0a0b18;border:1px solid #2a2d52;border-radius:10px}
.hud{margin:12px 0;color:#9aa0b8}.hud b{color:#00e0b8}
</style>
</head>
<body>
<a class="back" href="../../index.html">← Bot Built Arcade</a>
<h1>🚀 Asteroid Dodger</h1>
<div class="hud">Time: <b id="score">0.0s</b> · Best: <b id="best">0.0s</b> — ←/→ or A/D to steer. Any key to start.</div>
<canvas id="c" width="420" height="480"></canvas>
<script>
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let ship,rocks,stars,keys={},alive=false,t0=0,elapsed=0;
const best=()=>+localStorage.getItem("ad-best")||0;
document.getElementById("best").textContent=best().toFixed(1)+"s";
function reset(){
  ship={x:cv.width/2,y:cv.height-50};rocks=[];elapsed=0;t0=performance.now();alive=true;
  stars=Array.from({length:60},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,s:Math.random()*1.5+.5}));
}
addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;if(!alive)reset();
  if(["arrowleft","arrowright"].includes(e.key.toLowerCase()))e.preventDefault();});
addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});
function step(){
  ctx.fillStyle="#0a0b18";ctx.fillRect(0,0,cv.width,cv.height);
  if(alive){
    elapsed=(performance.now()-t0)/1000;
    document.getElementById("score").textContent=elapsed.toFixed(1)+"s";
    const speed=5;
    if(keys["arrowleft"]||keys["a"])ship.x-=speed;
    if(keys["arrowright"]||keys["d"])ship.x+=speed;
    ship.x=Math.max(15,Math.min(cv.width-15,ship.x));
    const spawn=.02+elapsed*.002;
    if(Math.random()<spawn)rocks.push({x:Math.random()*cv.width,y:-20,r:8+Math.random()*16,v:2+Math.random()*2+elapsed*.05});
    for(const r of rocks)r.y+=r.v;
    rocks=rocks.filter(r=>r.y<cv.height+30);
    for(const r of rocks){
      if(Math.hypot(r.x-ship.x,r.y-ship.y)<r.r+10){
        alive=false;
        if(elapsed>best()){localStorage.setItem("ad-best",elapsed);document.getElementById("best").textContent=elapsed.toFixed(1)+"s";}
      }
    }
  }
  for(const s of stars){s.y+=s.s;if(s.y>cv.height)s.y=0;ctx.fillStyle="rgba(232,233,243,.5)";ctx.fillRect(s.x,s.y,1.5,1.5);}
  ctx.fillStyle="#9aa0b8";
  for(const r of rocks){ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.fill();}
  if(alive||elapsed>0){
    ctx.fillStyle="#00e0b8";ctx.beginPath();
    ctx.moveTo(ship.x,ship.y-14);ctx.lineTo(ship.x-10,ship.y+10);ctx.lineTo(ship.x+10,ship.y+10);ctx.closePath();ctx.fill();
  }
  if(!alive){
    ctx.fillStyle="rgba(13,14,26,.6)";ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle="#e8e9f3";ctx.font="bold 24px system-ui";ctx.textAlign="center";
    ctx.fillText(elapsed>0?`Survived ${elapsed.toFixed(1)}s — any key`:"Press any key to launch",cv.width/2,cv.height/2);
  }
  requestAnimationFrame(step);
}
stars=Array.from({length:60},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,s:Math.random()*1.5+.5}));
ship={x:cv.width/2,y:cv.height-50};rocks=[];
step();
</script>
</body>
</html>
