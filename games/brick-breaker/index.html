<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Breaker — Bot Built Arcade</title>
<style>
body{background:#0d0e1a;color:#e8e9f3;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px}
a.back{color:#9aa0b8;text-decoration:none;align-self:flex-start}a.back:hover{color:#7c5cff}
h1{margin:10px 0}
canvas{background:#10122a;border:1px solid #2a2d52;border-radius:10px}
.hud{margin:12px 0;color:#9aa0b8}.hud b{color:#00e0b8}
</style>
</head>
<body>
<a class="back" href="../../index.html">← Bot Built Arcade</a>
<h1>🧱 Brick Breaker</h1>
<div class="hud">Score: <b id="score">0</b> · Lives: <b id="lives">3</b> — move the mouse, click to launch.</div>
<canvas id="c" width="480" height="400"></canvas>
<script>
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const COLS=8,ROWS=5,BW=cv.width/COLS,BH=20;
let paddle={x:200,w:80},ball,bricks,score=0,lives=3,launched=false,over=false;
const colors=["#ff5c8a","#ffd166","#00e0b8","#7c5cff","#5cc8ff"];
function resetBricks(){bricks=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)bricks.push({x:c*BW,y:40+r*BH,alive:true,color:colors[r]});}
function resetBall(){ball={x:paddle.x+paddle.w/2,y:cv.height-30,vx:0,vy:0,r:7};launched=false;}
resetBricks();resetBall();
cv.addEventListener("mousemove",e=>{const r=cv.getBoundingClientRect();paddle.x=Math.min(Math.max(e.clientX-r.left-paddle.w/2,0),cv.width-paddle.w);});
cv.addEventListener("click",()=>{
  if(over){over=false;score=0;lives=3;upd();resetBricks();resetBall();return;}
  if(!launched){launched=true;ball.vx=3*(Math.random()<.5?-1:1);ball.vy=-4.5;}
});
function upd(){document.getElementById("score").textContent=score;document.getElementById("lives").textContent=lives;}
function step(){
  if(!launched){ball.x=paddle.x+paddle.w/2;ball.y=cv.height-30;}
  else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.x<ball.r||ball.x>cv.width-ball.r)ball.vx*=-1;
    if(ball.y<ball.r)ball.vy*=-1;
    if(ball.y>cv.height){lives--;upd();if(lives<=0)over=true;else resetBall();}
    if(ball.vy>0&&ball.y>cv.height-22&&ball.y<cv.height-8&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
      ball.vy=-Math.abs(ball.vy);
      ball.vx=((ball.x-paddle.x)/paddle.w-.5)*8;
    }
    for(const b of bricks){
      if(!b.alive)continue;
      if(ball.x>b.x&&ball.x<b.x+BW&&ball.y-ball.r<b.y+BH&&ball.y+ball.r>b.y){
        b.alive=false;ball.vy*=-1;score+=10;upd();break;
      }
    }
    if(bricks.every(b=>!b.alive)){resetBricks();resetBall();ball.vy=0;}
  }
  draw();requestAnimationFrame(step);
}
function draw(){
  ctx.fillStyle="#10122a";ctx.fillRect(0,0,cv.width,cv.height);
  for(const b of bricks)if(b.alive){ctx.fillStyle=b.color;ctx.fillRect(b.x+2,b.y+2,BW-4,BH-4);}
  ctx.fillStyle="#e8e9f3";ctx.fillRect(paddle.x,cv.height-18,paddle.w,8);
  ctx.fillStyle="#00e0b8";ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fill();
  if(over){ctx.fillStyle="rgba(13,14,26,.7)";ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle="#e8e9f3";ctx.font="bold 26px system-ui";ctx.textAlign="center";
    ctx.fillText("Game Over — click to restart",cv.width/2,cv.height/2);}
}
step();
</script>
</body>
</html>
