<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match — Bot Built Arcade</title>
<style>
body{background:#0d0e1a;color:#e8e9f3;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px}
a.back{color:#9aa0b8;text-decoration:none;align-self:flex-start}a.back:hover{color:#7c5cff}
h1{margin:10px 0}
.hud{margin:12px 0;color:#9aa0b8}.hud b{color:#00e0b8}
.board{display:grid;grid-template-columns:repeat(4,80px);gap:10px}
.tile{width:80px;height:80px;background:#161830;border:1px solid #2a2d52;border-radius:10px;font-size:2rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;user-select:none}
.tile:hover{transform:scale(1.05);border-color:#7c5cff}
.tile.flipped{background:#1e2142;border-color:#00e0b8}
.tile.matched{background:rgba(0,224,184,.15);border-color:#00e0b8;cursor:default}
button{margin-top:16px;background:#7c5cff;color:#fff;border:none;border-radius:999px;padding:10px 24px;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
<a class="back" href="../../index.html">← Bot Built Arcade</a>
<h1>🃏 Memory Match</h1>
<div class="hud">Moves: <b id="moves">0</b> · Time: <b id="time">0s</b></div>
<div class="board" id="board"></div>
<button id="restart">New Game</button>
<script>
const EMOJIS=["🐍","🚀","🤖","⚡","🃏","🧱","👾","🎲"];
let first=null,lock=false,moves=0,matched=0,start=null,timer=null;
const board=document.getElementById("board");
function newGame(){
  board.innerHTML="";first=null;lock=false;moves=0;matched=0;start=null;clearInterval(timer);
  document.getElementById("moves").textContent=0;document.getElementById("time").textContent="0s";
  const deck=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-.5);
  deck.forEach(e=>{
    const t=document.createElement("div");t.className="tile";t.dataset.emoji=e;t.textContent="";
    t.addEventListener("click",()=>flip(t));board.appendChild(t);
  });
}
function flip(t){
  if(lock||t.classList.contains("flipped")||t.classList.contains("matched"))return;
  if(!start){start=Date.now();timer=setInterval(()=>{document.getElementById("time").textContent=((Date.now()-start)/1000|0)+"s";},250);}
  t.textContent=t.dataset.emoji;t.classList.add("flipped");
  if(!first){first=t;return;}
  moves++;document.getElementById("moves").textContent=moves;
  if(first.dataset.emoji===t.dataset.emoji){
    first.classList.add("matched");t.classList.add("matched");first=null;matched++;
    if(matched===EMOJIS.length){clearInterval(timer);setTimeout(()=>alert(`You win! ${moves} moves.`),200);}
  }else{
    lock=true;const a=first;first=null;
    setTimeout(()=>{a.textContent="";a.classList.remove("flipped");t.textContent="";t.classList.remove("flipped");lock=false;},700);
  }
}
document.getElementById("restart").addEventListener("click",newGame);
newGame();
</script>
</body>
</html>
