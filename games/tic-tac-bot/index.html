<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Bot — Bot Built Arcade</title>
<style>
body{background:#0d0e1a;color:#e8e9f3;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px}
a.back{color:#9aa0b8;text-decoration:none;align-self:flex-start}a.back:hover{color:#7c5cff}
h1{margin:10px 0}
.hud{margin:8px 0 16px;color:#9aa0b8;min-height:1.4em}
.board{display:grid;grid-template-columns:repeat(3,90px);gap:8px}
.cell{width:90px;height:90px;background:#161830;border:1px solid #2a2d52;border-radius:10px;font-size:2.6rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.cell:hover{border-color:#7c5cff}
.cell.x{color:#00e0b8}.cell.o{color:#ff5c8a}
button{margin-top:16px;background:#7c5cff;color:#fff;border:none;border-radius:999px;padding:10px 24px;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
<a class="back" href="../../index.html">← Bot Built Arcade</a>
<h1>🤖 Tic Tac Bot</h1>
<div class="hud" id="status">You are X. Your move.</div>
<div class="board" id="board"></div>
<button id="restart">New Game</button>
<script>
const LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells,b,done;
const boardEl=document.getElementById("board"),status=document.getElementById("status");
function newGame(){
  b=Array(9).fill(null);done=false;boardEl.innerHTML="";cells=[];
  status.textContent="You are X. Your move.";
  for(let i=0;i<9;i++){
    const c=document.createElement("div");c.className="cell";
    c.addEventListener("click",()=>move(i));boardEl.appendChild(c);cells.push(c);
  }
}
function winner(bd){for(const[a,x,y]of LINES)if(bd[a]&&bd[a]===bd[x]&&bd[a]===bd[y])return bd[a];return bd.every(v=>v)?"draw":null;}
function move(i){
  if(done||b[i])return;
  set(i,"X");
  let w=winner(b);
  if(!w){set(bestMove(),"O");w=winner(b);}
  if(w){done=true;status.textContent=w==="draw"?"It's a draw.":w==="X"?"You win! 🎉":"The bot wins. 🤖";}
}
function set(i,p){b[i]=p;cells[i].textContent=p;cells[i].classList.add(p.toLowerCase());}
function bestMove(){
  let bestScore=-Infinity,bestI=-1;
  for(let i=0;i<9;i++)if(!b[i]){b[i]="O";const s=minimax(false);b[i]=null;if(s>bestScore){bestScore=s;bestI=i;}}
  return bestI;
}
function minimax(maximizing){
  const w=winner(b);
  if(w==="O")return 1;if(w==="X")return -1;if(w==="draw")return 0;
  let best=maximizing?-Infinity:Infinity;
  for(let i=0;i<9;i++)if(!b[i]){
    b[i]=maximizing?"O":"X";
    const s=minimax(!maximizing);
    b[i]=null;
    best=maximizing?Math.max(best,s):Math.min(best,s);
  }
  return best;
}
document.getElementById("restart").addEventListener("click",newGame);
newGame();
</script>
</body>
</html>
