<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake — Bot Built Arcade</title>
<style>
body{background:#0d0e1a;color:#e8e9f3;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;margin:0;padding:20px}
a.back{color:#9aa0b8;text-decoration:none;align-self:flex-start}a.back:hover{color:#7c5cff}
h1{margin:10px 0}
canvas{background:#10122a;border:1px solid #2a2d52;border-radius:10px;box-shadow:0 0 30px rgba(124,92,255,.2)}
.hud{margin:12px 0;color:#9aa0b8}.hud b{color:#00e0b8}
</style>
</head>
<body>
<a class="back" href="../../index.html">← Bot Built Arcade</a>
<h1>🐍 Neon Snake</h1>
<div class="hud">Score: <b id="score">0</b> · Best: <b id="best">0</b> — arrow keys / WASD. Press any key to start.</div>
<canvas id="c" width="400" height="400"></canvas>
<script>
const cv=document.getElementById("c"),ctx=cv.getContext("2d"),N=20,S=cv.width/N;
let snake,dir,nextDir,food,score,alive,timer;
const best=()=>+localStorage.getItem("snake-best")||0;
document.getElementById("best").textContent=best();
function reset(){snake=[{x:10,y:10}];dir={x:1,y:0};nextDir=dir;score=0;alive=true;placeFood();
  document.getElementById("score").textContent=0;clearInterval(timer);timer=setInterval(tick,110);}
function placeFood(){do{food={x:Math.random()*N|0,y:Math.random()*N|0}}while(snake.some(s=>s.x===food.x&&s.y===food.y));}
function tick(){
  dir=nextDir;
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.y<0||h.x>=N||h.y>=N||snake.some(s=>s.x===h.x&&s.y===h.y)){alive=false;clearInterval(timer);
    if(score>best())localStorage.setItem("snake-best",score);document.getElementById("best").textContent=best();draw();return;}
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){score+=10;document.getElementById("score").textContent=score;placeFood();}
  else snake.pop();
  draw();
}
function draw(){
  ctx.fillStyle="#10122a";ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#ffd166";ctx.beginPath();ctx.arc(food.x*S+S/2,food.y*S+S/2,S/3,0,7);ctx.fill();
  snake.forEach((s,i)=>{ctx.fillStyle=i?"#7c5cff":"#00e0b8";ctx.fillRect(s.x*S+1,s.y*S+1,S-2,S-2);});
  if(!alive){ctx.fillStyle="rgba(13,14,26,.7)";ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle="#e8e9f3";ctx.font="bold 26px system-ui";ctx.textAlign="center";
    ctx.fillText("Game Over — press any key",cv.width/2,cv.height/2);}
}
addEventListener("keydown",e=>{
  const k=e.key.toLowerCase();
  const d={arrowup:[0,-1],w:[0,-1],arrowdown:[0,1],s:[0,1],arrowleft:[-1,0],a:[-1,0],arrowright:[1,0],d:[1,0]}[k];
  if(!alive){reset();return;}
  if(d&&!(d[0]===-dir.x&&d[1]===-dir.y)){nextDir={x:d[0],y:d[1]};e.preventDefault();}
});
reset();
</script>
</body>
</html>
